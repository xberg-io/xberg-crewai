# Generated by scripts/migrate_to_poly.py from .pre-commit-config.yaml + tool configs. Review before committing.

[defaults]
line_length = 120
line_ending = "lf"
final_newline = true
trim_trailing_whitespace = true

[discovery]
exclude = [
    "**/*.lock",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
    "dist/**",
]

[per-file-ignores]
"tests/**" = ["ANN", "D", "PLC0415", "PLR2004", "RUF043", "S101", "S108", "SLF001", "TC001", "TC003"]

[lint.python.ruff]
# E501: project line length is 120 (see [defaults] and pyproject `line-length`), but poly's
# ruff engine hardcodes E501 at 88 with no working line-length override. All flagged lines are
# <=120, so they are compliant; ruff-format (run at 120) owns line width. Ignore to match intent.
select = ["ALL"]
ignore = ["ANN401", "COM812", "D100", "D104", "D107", "D203", "D213", "E501", "ISC001", "PLR0913"]

[hooks]
stages = ["pre-commit"]

[hooks.builtin]
polylint = { exclude = [
    "**/*.lock",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
    "dist/**",
] }
polyfmt = { exclude = [
    "**/*.lock",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
    "dist/**",
] }
commit = { stages = ["commit-msg"] }
file_safety = { exclude = [
    "**/*.lock",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
    "dist/**",
] }

# --- catalog tools (standalone binaries, PATH-probed) ---
[tools.pyrefly]
enabled = true
# TODO exclude: regex not auto-convertible to glob: ^(examples|tests|benchmarks|e2e)/

[tools.actionlint]
enabled = true

# --- lightweight inline script hooks (no toolchain) ---
[hooks.pre-commit.scripts.ai_rulez_generate]
# TODO: wire to vendored script / task target (was a shared pre-commit-hooks hook).
run = "TODO-ai-rulez-generate"

[hooks.pre-commit.scripts.gh_actions_updater]
# TODO: wire to vendored script / task target (was a shared pre-commit-hooks hook).
run = "TODO-gh-actions-updater"
